<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文件共享面板</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div id="app" class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl p-6">
    <h1 class="text-3xl font-bold mb-4">文件共享面板</h1>

    <div class="mb-4 p-3 bg-gray-50 rounded-lg">
      <div class="flex items-center space-x-1 text-sm">
        <span @click="goToPath('')" class="cursor-pointer text-blue-600 hover:text-blue-800">根目录</span>
        <span v-for="(part, index) in pathParts" :key="index">
          <span class="mx-1">/</span>
          <span
            @click="goToPath(pathParts.slice(0, index + 1).join('/'))"
            class="cursor-pointer text-blue-600 hover:text-blue-800"
          >
            {{ part }}
          </span>
        </span>
      </div>
    </div>

    <div class="mb-6">
      <input type="file" @change="selectFile" class="mb-2">
      <button
        @click="upload"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
      >
        上传
      </button>

      <div v-if="progress > 0" class="mt-2 bg-gray-200 rounded-lg h-2">
        <div class="bg-blue-500 h-2 rounded-lg" :style="{ width: progress + '%' }"></div>
      </div>
    </div>

    <div class="mb-6 p-4 bg-gray-50 rounded-lg">
      <div class="flex items-center space-x-3">
        <div class="relative flex-1">
          <input
            type="text"
            v-model="searchQuery"
            placeholder="搜索当前目录中的文件或文件夹..."
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
      </div>
      <div v-if="searchQuery" class="mt-2 text-sm text-gray-600">
        找到 {{ filteredFolders.length + filteredFiles.length }} 个结果
      </div>
    </div>

    <h2 class="text-xl font-semibold mb-2">文件夹</h2>
    <div class="space-y-2 mb-6">
      <div
        v-for="folder in filteredFolders"
        :key="folder.path"
        @click="goToPath(folder.path)"
        class="flex justify-between items-center bg-blue-50 p-3 rounded-lg shadow-sm cursor-pointer hover:bg-blue-100"
      >
        <div>
          <div class="font-semibold">
            <span v-html="highlightMatch(folder.name, searchQuery)"></span>
          </div>
          <div class="text-xs text-gray-500">
            文件夹 | {{ new Date(folder.mtime * 1000).toLocaleString() }}
          </div>
        </div>
        <div class="text-blue-600">进入</div>
      </div>
      <div v-if="filteredFolders.length === 0 && searchQuery" class="text-center py-4 text-gray-500">
        未找到匹配的文件夹
      </div>
    </div>

    <div class="flex justify-between items-center mb-2">
      <h2 class="text-xl font-semibold">文件</h2>
      <div class="flex items-center space-x-2">
        <span class="text-sm text-gray-600">排序:</span>
        <div class="flex space-x-1">
          <button
            @click="setFileSort('name')"
            :class="fileSortBy === 'name' ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-gray-100 text-gray-700 border-gray-300'"
            class="px-3 py-1 text-sm border rounded-lg hover:bg-gray-200"
          >
            名称 {{ fileSortBy === 'name' ? (fileSortOrder === 'asc' ? '↑' : '↓') : '' }}
          </button>
          <button
            @click="setFileSort('size')"
            :class="fileSortBy === 'size' ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-gray-100 text-gray-700 border-gray-300'"
            class="px-3 py-1 text-sm border rounded-lg hover:bg-gray-200"
          >
            大小 {{ fileSortBy === 'size' ? (fileSortOrder === 'asc' ? '↑' : '↓') : '' }}
          </button>
          <button
            @click="setFileSort('mtime')"
            :class="fileSortBy === 'mtime' ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-gray-100 text-gray-700 border-gray-300'"
            class="px-3 py-1 text-sm border rounded-lg hover:bg-gray-200"
          >
            修改日期 {{ fileSortBy === 'mtime' ? (fileSortOrder === 'asc' ? '↑' : '↓') : '' }}
          </button>
        </div>
      </div>
    </div>

    <div class="space-y-2">
      <div
        v-for="file in filteredFiles"
        :key="file.path"
        class="flex justify-between items-center bg-gray-50 p-3 rounded-lg shadow-sm"
      >
        <div>
          <div class="font-semibold">
            <span v-html="highlightMatch(file.name, searchQuery)"></span>
          </div>
          <div class="text-xs text-gray-500">
            {{ (file.size / 1024).toFixed(1) }} KB |
            {{ new Date(file.mtime * 1000).toLocaleString() }}
          </div>
        </div>
        <div class="flex items-center space-x-2">
          <button
            @click="createShareLink(file.path)"
            class="px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700"
          >
            分享链接
          </button>
          <button
            @click="download(file.path)"
            class="px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700"
          >
            下载
          </button>
        </div>
      </div>
      <div v-if="filteredFiles.length === 0 && searchQuery" class="text-center py-4 text-gray-500">
        未找到匹配的文件
      </div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue

    createApp({
      setup() {
        const currentPath = ref("")
        const folders = ref([])
        const files = ref([])
        const selectedFile = ref(null)
        const progress = ref(0)
        const searchQuery = ref("")
        const fileSortBy = ref("name")
        const fileSortOrder = ref("asc")
        const apiBase = `${window.location.origin}/api`

        const pathParts = computed(() => {
          return currentPath.value ? currentPath.value.split("/").filter(Boolean) : []
        })

        const sortedFolders = computed(() => {
          return [...folders.value].sort((a, b) => a.name.localeCompare(b.name, "zh-CN"))
        })

        const sortedFiles = computed(() => {
          return [...files.value].sort((a, b) => {
            let compareResult = 0

            if (fileSortBy.value === "name") {
              compareResult = a.name.localeCompare(b.name, "zh-CN")
            } else if (fileSortBy.value === "size") {
              compareResult = a.size - b.size
            } else if (fileSortBy.value === "mtime") {
              compareResult = a.mtime - b.mtime
            }

            return fileSortOrder.value === "asc" ? compareResult : -compareResult
          })
        })

        const filteredFolders = computed(() => {
          if (!searchQuery.value) {
            return sortedFolders.value
          }

          const query = searchQuery.value.toLowerCase()
          return sortedFolders.value.filter((folder) => folder.name.toLowerCase().includes(query))
        })

        const filteredFiles = computed(() => {
          if (!searchQuery.value) {
            return sortedFiles.value
          }

          const query = searchQuery.value.toLowerCase()
          return sortedFiles.value.filter((file) => file.name.toLowerCase().includes(query))
        })

        function setFileSort(sortBy) {
          if (fileSortBy.value === sortBy) {
            fileSortOrder.value = fileSortOrder.value === "asc" ? "desc" : "asc"
            return
          }

          fileSortBy.value = sortBy
          fileSortOrder.value = "asc"
        }

        function highlightMatch(text, query) {
          if (!query) return text
          const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
          const regex = new RegExp(`(${escapedQuery})`, "gi")
          return text.replace(regex, '<span class="bg-yellow-200 font-semibold">$1</span>')
        }

        async function fetchFiles(path = "") {
          const url = path ? `${apiBase}/list/${encodeURI(path)}` : `${apiBase}/list`
          const response = await fetch(url)
          if (!response.ok) {
            alert("读取目录失败")
            return
          }

          const data = await response.json()
          currentPath.value = data.path || ""
          folders.value = data.folders || []
          files.value = data.files || []
        }

        function selectFile(event) {
          selectedFile.value = event.target.files[0]
        }

        function upload() {
          if (!selectedFile.value) {
            alert("未选择文件")
            return
          }

          const formData = new FormData()
          formData.append("file", selectedFile.value)

          const xhr = new XMLHttpRequest()
          const uploadUrl = currentPath.value
            ? `${apiBase}/upload?path=${encodeURIComponent(currentPath.value)}`
            : `${apiBase}/upload`
          xhr.open("POST", uploadUrl)

          xhr.upload.onprogress = (event) => {
            if (event.lengthComputable) {
              progress.value = Math.round((event.loaded / event.total) * 100)
            }
          }

          xhr.onload = () => {
            progress.value = 0
            if (xhr.status === 200) {
              fetchFiles(currentPath.value)
              alert("上传成功")
              return
            }

            alert(`上传失败: ${xhr.responseText}`)
          }

          xhr.send(formData)
        }

        function download(filepath) {
          window.open(`${apiBase}/download/${encodeURI(filepath)}`)
        }

        async function createShareLink(filepath) {
          const response = await fetch(`${apiBase}/share-link`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              filepath,
              expire_seconds: 3600
            })
          })

          if (!response.ok) {
            alert(`生成分享链接失败: ${await response.text()}`)
            return
          }

          const data = await response.json()
          const shareUrl = new URL(data.download_url, window.location.origin).toString()

          try {
            await navigator.clipboard.writeText(shareUrl)
            alert(`分享链接已复制到剪贴板:\n${shareUrl}`)
          } catch (error) {
            alert(`分享链接生成成功，请手动复制:\n${shareUrl}`)
          }
        }

        function goToPath(path) {
          fetchFiles(path)
        }

        fetchFiles()

        return {
          currentPath,
          folders,
          files,
          filteredFolders,
          filteredFiles,
          searchQuery,
          fileSortBy,
          fileSortOrder,
          pathParts,
          selectedFile,
          progress,
          selectFile,
          upload,
          download,
          createShareLink,
          goToPath,
          setFileSort,
          highlightMatch
        }
      }
    }).mount("#app")
  </script>
</body>
</html>
